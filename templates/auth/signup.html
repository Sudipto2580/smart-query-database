<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1d4ed8);
            font-family:Arial;
        }

        .signup-card{
            width:450px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .signup-title{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .btn-success{
            width:100%;
            border-radius:10px;
            padding:10px;
        }

        .form-control{
            border-radius:10px;
            margin-bottom:20px;
            padding:12px;
        }

    </style>

</head>

<body>

<div class="signup-card">

    <h1 class="signup-title">Create Account</h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter Username"
            required
        >

        <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter Password"
            required
        >

        <button class="btn btn-success">
            Create Account
        </button>

    </form>

</div>

</body>
{% with messages = get_flashed_messages(with_categories=true) %}

    {% if messages %}

        {% for category, message in messages %}

            <div class="alert alert-{{ category }} text-center">
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}

{% endwith %}
</html>
