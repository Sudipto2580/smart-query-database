{% extends 'base.html' %}

{% block title %}
Add Product
{% endblock %}

{% block page_title %}
Add Product
{% endblock %}

{% block content %}

<div class="dashboard-card">

<form
    method="POST"
    enctype="multipart/form-data"
>

    <input
        type="text"
        name="product_name"
        class="form-control mb-3"
        placeholder="Product Name"
        required
    >

    <textarea
        name="description"
        class="form-control mb-3"
        placeholder="Description"
        rows="5"
        required
    ></textarea>

    <input
        type="number"
        name="price"
        class="form-control mb-3"
        placeholder="Price"
        required
    >

    <input
        type="number"
        name="stock"
        class="form-control mb-3"
        placeholder="Stock"
        required
    >

    <input
        type="number"
        step="0.1"
        name="rating"
        class="form-control mb-3"
        placeholder="Rating"
        required
    >

    <input
        type="file"
        name="image"
        class="form-control mb-4"
        required
    >

    <button class="btn btn-success">
        Add Product
    </button>

</form>

</div>

{% endblock %}
